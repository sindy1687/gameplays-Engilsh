<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>成就徽章 - Typing Hero</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="responsive_enhanced.css">
  <style>
    /* ========== 可愛遊戲風格成就中心 ========== */
    
    * {
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-attachment: fixed;
      color: #333;
      text-align: center;
      min-height: 100vh;
      line-height: 1.6;
      padding: 20px;
    }
    
    /* 頁面外層 */
    .achievement-page {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    /* 頁首區 */
    .achievement-header {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 30px;
      padding: 30px 40px;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      position: relative;
      overflow: hidden;
    }
    
    .achievement-header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      animation: shimmer 3s infinite;
    }
    
    @keyframes shimmer {
      0% { transform: translateX(-100%) rotate(45deg); }
      100% { transform: translateX(100%) rotate(45deg); }
    }
    
    .achievement-title {
      margin: 0 0 10px 0;
      font-size: 2.5rem;
      color: #667eea;
      font-weight: 800;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      position: relative;
      z-index: 1;
    }
    
    .achievement-subtitle {
      margin: 0 0 20px 0;
      font-size: 1.2rem;
      color: #764ba2;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }
    
    .achievement-back-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }
    
    .achievement-back-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
    }
    
    .achievement-back-btn:active {
      transform: translateY(-1px);
    }
    
    /* 玩家成就統計區 */
    .achievement-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .achievement-summary-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 25px;
      padding: 25px 20px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      border: 3px solid transparent;
    }
    
    .achievement-summary-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }
    
    .achievement-summary-number {
      font-size: 2.5rem;
      font-weight: 800;
      color: #667eea;
      margin-bottom: 8px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
    }
    
    .achievement-summary-label {
      font-size: 1rem;
      color: #764ba2;
      font-weight: 600;
    }
    
    /* 操作區 */
    .achievement-actions {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 25px;
      padding: 25px 30px;
      margin-bottom: 30px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    
    .achievement-claim-all-btn {
      background: linear-gradient(135deg, #ffd93d, #ff6b6b);
      color: white;
      border: none;
      padding: 16px 40px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 800;
      font-size: 1.2rem;
      box-shadow: 0 8px 25px rgba(255, 217, 61, 0.4);
      transition: all 0.3s ease;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
    }
    
    .achievement-claim-all-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 35px rgba(255, 217, 61, 0.5);
    }
    
    .achievement-claim-all-btn:active {
      transform: translateY(-1px) scale(0.98);
    }
    
    .achievement-refresh-btn {
      background: linear-gradient(135deg, #a8e6cf, #88d8b0);
      color: #2d5a4a;
      border: none;
      padding: 16px 30px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 8px 25px rgba(168, 230, 207, 0.4);
      transition: all 0.3s ease;
    }
    
    .achievement-refresh-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(168, 230, 207, 0.5);
    }
    
    .achievement-refresh-btn:active {
      transform: translateY(-1px);
    }
    
    /* 分類篩選區 */
    .filter-section {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 25px;
      padding: 25px 30px;
      margin-bottom: 30px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
    }
    
    .filter-title {
      color: #667eea;
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 20px;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
    }
    
    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    
    .filter-btn {
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      color: #667eea;
      border: 2px solid #667eea;
      padding: 12px 24px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
    }
    
    .filter-btn:hover {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    
    .filter-btn.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    
    .filter-btn.all {
      background: linear-gradient(135deg, #ffd93d, #ff6b6b);
      color: white;
      border-color: #ff6b6b;
    }
    
    .filter-btn.all:hover {
      box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
    }
    
    /* 成就列表區 */
    .achievement-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 25px;
      padding: 10px;
    }
    
    /* 成就卡片 */
    .achievement-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      border: 3px solid transparent;
      text-align: left;
      position: relative;
      overflow: hidden;
    }
    
    .achievement-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }
    
    /* 可領取成就 - 亮色外框 */
    .achievement-card.claimable {
      border-color: #ffd93d;
      box-shadow: 0 8px 30px rgba(255, 217, 61, 0.3);
      animation: claimablePulse 2s ease-in-out infinite;
    }
    
    @keyframes claimablePulse {
      0%, 100% { box-shadow: 0 8px 30px rgba(255, 217, 61, 0.3); }
      50% { box-shadow: 0 12px 40px rgba(255, 217, 61, 0.5); }
    }
    
    /* 已領取成就 - 降低透明度 */
    .achievement-card.claimed {
      opacity: 0.6;
      background: rgba(255, 255, 255, 0.7);
    }
    
    /* 未完成成就 - 灰階效果 */
    .achievement-card.locked {
      filter: grayscale(0.8);
      opacity: 0.7;
    }
    
    .achievement-card-icon {
      font-size: 3rem;
      margin-bottom: 15px;
      display: block;
    }
    
    .achievement-card-content {
      margin-bottom: 15px;
    }
    
    .achievement-card-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: #667eea;
      margin-bottom: 8px;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
    }
    
    .achievement-card-desc {
      font-size: 0.95rem;
      color: #555;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    
    .achievement-progress {
      background: #f0f0f0;
      border-radius: 15px;
      height: 12px;
      margin: 12px 0;
      overflow: hidden;
      position: relative;
    }
    
    .achievement-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 15px;
      transition: width 0.5s ease;
    }
    
    .achievement-progress-text {
      font-size: 0.85rem;
      color: #764ba2;
      font-weight: 600;
      margin-top: 5px;
    }
    
    .achievement-reward {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.1rem;
      font-weight: 800;
      color: #ffd93d;
      margin-bottom: 12px;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
    }
    
    .achievement-status {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    
    .achievement-status-locked {
      background: #e0e0e0;
      color: #888;
    }
    
    .achievement-status-claimable {
      background: linear-gradient(135deg, #ffd93d, #ff6b6b);
      color: white;
      animation: statusGlow 2s ease-in-out infinite;
    }
    
    @keyframes statusGlow {
      0%, 100% { box-shadow: 0 0 10px rgba(255, 217, 61, 0.5); }
      50% { box-shadow: 0 0 20px rgba(255, 217, 61, 0.8); }
    }
    
    .achievement-status-claimed {
      background: #a8e6cf;
      color: #2d5a4a;
    }
    
    .achievement-claim-btn {
      background: linear-gradient(135deg, #ffd93d, #ff6b6b);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 800;
      font-size: 1rem;
      box-shadow: 0 5px 20px rgba(255, 217, 61, 0.4);
      transition: all 0.3s ease;
      width: 100%;
    }
    
    .achievement-claim-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 217, 61, 0.5);
    }
    
    .achievement-claim-btn:active {
      transform: translateY(0);
    }
    
    /* 空狀態 */
    .empty-state {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 25px;
      padding: 60px 40px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
    }
    
    .empty-state-text {
      font-size: 1.5rem;
      color: #764ba2;
      font-weight: 700;
      margin-bottom: 20px;
    }
    
    /* 背景音樂按鈕 */
    #muteToggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1001;
      background: rgba(255, 255, 255, 0.95);
      color: #667eea;
      border: 3px solid #667eea;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    #muteToggle:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }
    
    /* ========== 保留原本的成就彈窗樣式 ========== */
    .achievement-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(12px);
      animation: modalFadeIn 0.4s ease-out;
      padding: 14px;
    }
    
    @keyframes modalFadeIn {
      from {
        opacity: 0;
        transform: scale(0.7);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    .achievement-modal-content {
      background: linear-gradient(145deg, rgba(18, 22, 36, 0.92), rgba(10, 12, 22, 0.88));
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      padding: 0;
      max-width: 420px;
      width: calc(100% - 28px);
      position: relative;
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.55);
      animation: modalPop 0.35s ease-out;
      overflow: hidden;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
    }
    
    @keyframes modalPop {
      0% {
        transform: scale(0.2) rotate(-15deg);
        opacity: 0;
      }
      50% {
        transform: scale(1.15) rotate(3deg);
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }
    
    .achievement-modal-header {
      padding: 18px 18px 14px;
      background: radial-gradient(120% 120% at 10% 0%, rgba(124, 92, 255, 0.45) 0%, rgba(0, 229, 255, 0.22) 40%, rgba(255, 255, 255, 0) 75%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }
    
    .achievement-modal-header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      animation: shimmer 3s infinite;
    }
    
    .achievement-modal-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      box-shadow: 0 0 0 6px rgba(124, 92, 255, 0.12);
      flex: 0 0 auto;
      margin-bottom: 0;
      filter: none;
      animation: none;
      position: relative;
      z-index: 1;
    }
    
    .achievement-modal-title {
      font-size: 1.25rem;
      font-weight: 800;
      color: rgba(233, 238, 252, 0.95);
      margin: 0;
      text-shadow: none;
      position: relative;
      z-index: 1;
      letter-spacing: 0.5px;
      text-align: left;
    }
    
    .achievement-modal-body {
      padding: 16px 18px 18px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      text-align: left;
    }
    
    .achievement-modal-description {
      font-size: 1.02rem;
      color: rgba(233, 238, 252, 0.78);
      margin-bottom: 12px;
      line-height: 1.55;
      font-weight: 600;
    }
    
    .achievement-modal-reward {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: linear-gradient(135deg, rgba(255, 204, 77, 0.20), rgba(255, 204, 77, 0.08));
      border-radius: 14px;
      padding: 12px 14px;
      margin: 10px 0 12px;
      color: rgba(233, 238, 252, 0.95);
      font-weight: 800;
      font-size: 1.05rem;
      box-shadow: 0 10px 28px rgba(255, 204, 77, 0.12);
      border: 1px solid rgba(255, 204, 77, 0.35);
      position: relative;
      overflow: hidden;
    }
    
    .achievement-modal-reward::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      animation: shimmer 2s infinite;
    }
    
    .achievement-modal-stars {
      font-size: 1.6rem;
      margin-right: 10px;
      animation: starTwinkle 1.5s ease-in-out infinite;
    }
    
    @keyframes starTwinkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.1); }
    }
    
    .achievement-modal-total {
      padding: 11px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: rgba(233, 238, 252, 0.9);
      font-weight: 700;
      font-size: 0.98rem;
      margin: 0 0 14px;
      box-shadow: none;
    }
    
    .achievement-modal-close {
      background: linear-gradient(135deg, #33ff90, #16d66f);
      color: #052014;
      border: none;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 12px 30px rgba(22, 214, 111, 0.22);
      transition: transform .12s ease, filter .12s ease;
      font-family: 'Microsoft JhengHei', system-ui, -apple-system, sans-serif;
      letter-spacing: 0.5px;
      width: 100%;
    }
    
    .achievement-modal-close:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }
    
    .achievement-modal-close:active {
      transform: translateY(0);
      filter: brightness(0.98);
    }

    .achievement-modal-x {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .15s ease, background .15s ease;
      z-index: 15;
    }

    .achievement-modal-x:hover {
      background: rgba(255, 255, 255, 0.14);
      transform: scale(1.03);
    }

    .achievement-modal-card {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      margin: 0 0 14px;
    }

    .achievement-modal-card-media {
      width: 86px;
      height: 86px;
      border-radius: 14px;
      overflow: hidden;
      flex: 0 0 auto;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .achievement-modal-card-media img,
    .achievement-modal-card-media video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .achievement-modal-card-meta {
      text-align: left;
      min-width: 0;
    }

    .achievement-modal-card-title {
      font-weight: 800;
      font-size: 1.02rem;
      color: rgba(233, 238, 252, 0.95);
      line-height: 1.25;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .achievement-modal-card-sub {
      font-weight: 700;
      font-size: 0.92rem;
      color: rgba(233, 238, 252, 0.78);
    }
    
    .achievement-modal-particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #ffd700;
      border-radius: 50%;
      animation: particleFloat 4s ease-out forwards;
      box-shadow: 0 0 10px currentColor;
    }
    
    @keyframes particleFloat {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translateY(-150px) scale(0) rotate(360deg);
      }
    }
    
    .confetti {
      position: absolute;
      width: 12px;
      height: 12px;
      animation: confettiFall 3s ease-out forwards;
      border-radius: 2px;
    }
    
    @keyframes confettiFall {
      0% {
        opacity: 1;
        transform: translateY(-50px) rotate(0deg) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(100vh) rotate(720deg) scale(0.5);
      }
    }

    /* 影片 Modal 樣式 */
    .video-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(8px);
    }
    
    .video-modal-content {
      background: rgba(255, 255, 255, 0.95);
      border: 3px solid #667eea;
      border-radius: 20px;
      width: 90%;
      max-width: 800px;
      max-height: 90vh;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(102, 126, 234, 0.3);
    }
    
    .video-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 25px;

    // 新增：成就彈窗相關函數
    function showAchievementModal(achievement, reward, totalStars) {
      // 播放星星音效
      playStarSound();
      
      const modal = document.getElementById('achievementModal');
      const icon = document.getElementById('modalIcon');
      const title = document.getElementById('modalTitle');
      const description = document.getElementById('modalDescription');
      const rewardText = document.getElementById('modalRewardText');
      const totalText = document.getElementById('modalTotal');
      const cardPreview = document.getElementById('modalCardPreview');
      
      // 更新彈窗內容
      icon.textContent = achievement.icon;
      title.textContent = achievement.name;
      description.textContent = achievement.description;
      rewardText.textContent = `獎勵星星：${reward} 顆`;
      totalText.textContent = `當前星星總數：${totalStars} 顆`;

      // SSR 成就：顯示獲得的卡片與卡片倉庫圖片（cards.js 的 allCards）
      if (achievement.type === 'ssr_special' && achievement.id && achievement.id.startsWith('ssr_')) {
        const cardWord = achievement.id.replace('ssr_', '');
        const card = (window.allCards || []).find(c => c.word === cardWord);
        if (card) {
          const mediaUrl = card.image || '';
          const isVideo = /\.mp4(\?|$)/i.test(mediaUrl);
          const displayName = card.zh ? `${card.zh}` : card.word;
          const rarity = card.rarity || '未知稀有度';

          // 生成預覽區塊
          cardPreview.innerHTML = `
            <div class="achievement-modal-card-media">
              ${isVideo
                ? `<video src="${mediaUrl}" autoplay loop muted playsinline></video>`
                : `<img src="${mediaUrl}" alt="${displayName}">`}
            </div>
            <div class="achievement-modal-card-meta">
              <div class="achievement-modal-card-title">🎴 你獲得了：${displayName}</div>
              <div class="achievement-modal-card-sub">稀有度：${rarity}　｜　英文：${card.word}</div>
            </div>
          `;
          cardPreview.style.display = 'flex';
        } else {
          cardPreview.innerHTML = '';
          cardPreview.style.display = 'none';
        }
      } else {
        cardPreview.innerHTML = '';
        cardPreview.style.display = 'none';
      }
      
      // 顯示彈窗
      modal.style.display = 'flex';
      
      // 創建粒子效果
      createParticles();
      createConfetti();

          closeAchievementModal();
        }
      };

    function closeAchievementModal() {
      const modal = document.getElementById('achievementModal');
      modal.style.display = 'none';

      if (cardPreview) {
        cardPreview.innerHTML = '';
        cardPreview.style.display = 'none';
      }
      
      // 清除粒子
      const particles = document.getElementById('particles');
      particles.innerHTML = '';
      
      // 移除點擊事件
      modal.onclick = null;
    }
    
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      particlesContainer.innerHTML = '';
      
      const colors = ['#ffd700', '#00ffff', '#a259ff', '#ff6b6b', '#00ff00', '#ffaa00'];
      const shapes = ['circle', 'square', 'triangle'];
      
      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 3 + 's';
        particle.style.animationDuration = (3 + Math.random() * 2) + 's';
        
        const color = colors[Math.floor(Math.random() * colors.length)];
        particle.style.backgroundColor = color;
        particle.style.boxShadow = `0 0 15px ${color}`;
        
        // 隨機大小
        const size = 4 + Math.random() * 6;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        
        particlesContainer.appendChild(particle);
      }
    }
    
    function createConfetti() {
      const particlesContainer = document.getElementById('particles');
      const colors = ['#ffd700', '#00ffff', '#a259ff', '#ff6b6b', '#00ff00', '#ffaa00', '#ff8800'];
      
      for (let i = 0; i < 25; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDelay = Math.random() * 2 + 's';
        confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
        
        // 隨機形狀
        const shape = Math.random() > 0.5 ? 'circle' : 'square';
        if (shape === 'circle') {
          confetti.style.borderRadius = '50%';
        }
        
        // 隨機大小
        const size = 8 + Math.random() * 8;
        confetti.style.width = size + 'px';
        confetti.style.height = size + 'px';
        
        particlesContainer.appendChild(confetti);
      }
    }
    
    function playStarSound() {
      try {
        const starSound = new Audio('sound/shine.mp3');

          console.log('無法播放星星音效:', e);

      } catch (e) {

      }

      const totalAchievements = achievements.length;

      const filterButtons = document.getElementById('filterButtons');

      const allBtn = document.createElement('button');
      allBtn.className = 'filter-btn all active';

      allBtn.onclick = () => setFilter('all');
      
      // 添加全部成就的數量泡泡
      const allCount = getUnclaimedAchievementsCount();
      if (allCount > 0) {
        const allBadge = document.createElement('div');
        allBadge.className = 'achievement-badge';
        allBadge.textContent = allCount;
        allBadge.id = 'badge-all';
        allBtn.appendChild(allBadge);
      }
      
      filterButtons.appendChild(allBtn);
      
      // 原有分類按鈕
      Object.entries(groupTitles).forEach(([type, title]) => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = title;
        btn.onclick = () => setFilter(type);
        
        // 添加該分類的數量泡泡
        const typeCount = getUnclaimedAchievementsCountByType(type);
        if (typeCount > 0) {
          const typeBadge = document.createElement('div');
          typeBadge.className = 'achievement-badge';
          typeBadge.textContent = typeCount;
          typeBadge.id = `badge-${type}`;
          btn.appendChild(typeBadge);
        }
        
        filterButtons.appendChild(btn);
      });
    }
    
    // 新增：計算所有未領取成就數量
    function getUnclaimedAchievementsCount() {
      const claimed = getClaimedAchievements();
      return achievements.filter(ach => 
        checkAchievementUnlocked(ach) && !claimed.includes(ach.id)
      ).length;
    }
    
    // 新增：計算特定類型未領取成就數量
    function getUnclaimedAchievementsCountByType(type) {
      const claimed = getClaimedAchievements();
      return achievements.filter(ach => 
        ach.type === type && checkAchievementUnlocked(ach) && !claimed.includes(ach.id)
      ).length;
    }

    function getCardsByRarity(rarity) {
      if (!window.allCards) return [];
      return allCards.filter(card => card.rarity === rarity && ownedCards[card.word]);
    }
    
    // 新增：計算成就進度
    function getAchievementProgress(ach) {
      let current = 0;
      switch (ach.type) {
        case 'collection':
        case 'special':
          current = Object.keys(ownedCards).length;
          break;
        case 'rarity':
          current = getCardsByRarity(ach.rarity).length;
          break;
        case 'shards':
          current = Object.values(shards).reduce((sum, c) => sum + c, 0);
          break;
        case 'stars':
          current = parseInt(localStorage.getItem('totalStars') || '0');
          break;
        case 'performance':
          // 計算通過的關卡數量（基於不同遊戲類型的完成次數）
          const fillGames = parseInt(localStorage.getItem('fillGamesCompleted') || '0');
          const cardGames = parseInt(localStorage.getItem('cardGamesCompleted') || '0');
          const quizGames = parseInt(localStorage.getItem('quizGamesCompleted') || '0');
          const spellingGames = parseInt(localStorage.getItem('spellingGamesCompleted') || '0');
          const matchingGames = parseInt(localStorage.getItem('matchingGamesCompleted') || '0');
          const timeChallengeGames = parseInt(localStorage.getItem('timeChallengeGamesCompleted') || '0');
          current = fillGames + cardGames + quizGames + spellingGames + matchingGames + timeChallengeGames;
          break;
        case 'fill':
          switch (ach.id) {
            case 'fill_beginner':
            case 'fill_regular':
            case 'fill_expert':
            case 'fill_master':
              current = parseInt(localStorage.getItem('fillGamesCompleted') || '0');
              break;
            case 'fill_perfect':
              current = parseInt(localStorage.getItem('fillPerfectScores') || '0');
              break;
            case 'fill_speed':
              current = parseInt(localStorage.getItem('fillSpeedGames') || '0');
              break;
            case 'fill_streak':
              current = parseInt(localStorage.getItem('fillStreakDays') || '0');
              break;
            case 'fill_vocab':
              current = parseInt(localStorage.getItem('fillCorrectWords') || '0');
              break;
            default:
              current = 0;
          }
          break;
        case 'zodiac':
          // 星座關卡成就：檢查該星座是否已通過
          const zodiacKey = ach.id.replace('pass_', '');
          const passedAtlas = JSON.parse(localStorage.getItem('passed_atlas') || '[]');
          current = passedAtlas.includes(zodiacKey) ? 1 : 0;
          break;
        case 'greek':
          // 希臘神祇關卡成就：檢查該神祇關卡是否已通過
          const greekKey = ach.id.replace('pass_', '');
          const passedGreek = JSON.parse(localStorage.getItem('passed_greek') || '[]');
          current = passedGreek.includes(greekKey) ? 1 : 0;
          break;
        case 'vocabulary':
          // 單字達人成就：計算答對的單字本單字數量
          current = parseInt(localStorage.getItem('vocabularyCorrectWords') || '0');
          break;
        case 'ssr_special':
          // SSR 特殊成就：檢查是否已解鎖該 SSR 卡片
          const cardWord = ach.id.replace('ssr_', '');
          current = ownedCards[cardWord] ? 1 : 0;
          break;
        case 'article':
          // 文章練習成就：計算文章練習相關進度
          switch (ach.id) {
            case 'article_practice_3':
              // 檢查文章練習完成次數
              current = parseInt(localStorage.getItem('articlePracticeCount') || '0');
              break;
            case 'article_perfect_score':
              // 檢查滿分次數
              const perfectScores = JSON.parse(localStorage.getItem('readingPerfectScores') || '[]');
              current = perfectScores.length;
              break;
            default:
              // 檢查特定關卡通關進度
              if (ach.id.startsWith('article_level_')) {
                const levelNumber = parseInt(ach.id.replace('article_level_', ''));
                const completedLevels = JSON.parse(localStorage.getItem('completedReadingLevels') || '[]');
                current = completedLevels.includes(levelNumber) ? 1 : 0;
              } else {
                current = 0;
              }
              break;
          }
          break;
        default:
          current = 0;
      }
      return Math.min(current, ach.requirement);
    }
    
    // 新增：取得進度百分比
    function getProgressPercentage(ach) {
      const current = getAchievementProgress(ach);
      return Math.min((current / ach.requirement) * 100, 100);
    }
    
    function checkAchievementUnlocked(ach) {
      switch (ach.type) {
        case 'collection':
        case 'special':
          return Object.keys(ownedCards).length >= ach.requirement;
        case 'rarity':
          return getCardsByRarity(ach.rarity).length >= ach.requirement;
        case 'shards':
          return Object.values(shards).reduce((sum, c) => sum + c, 0) >= ach.requirement;
        case 'stars':
          return parseInt(localStorage.getItem('totalStars') || '0') >= ach.requirement;
        case 'performance':
          // 計算通過的關卡數量（基於不同遊戲類型的完成次數）
          const fillGames = parseInt(localStorage.getItem('fillGamesCompleted') || '0');
          const cardGames = parseInt(localStorage.getItem('cardGamesCompleted') || '0');
          const quizGames = parseInt(localStorage.getItem('quizGamesCompleted') || '0');
          const spellingGames = parseInt(localStorage.getItem('spellingGamesCompleted') || '0');
          const matchingGames = parseInt(localStorage.getItem('matchingGamesCompleted') || '0');
          const timeChallengeGames = parseInt(localStorage.getItem('timeChallengeGamesCompleted') || '0');
          return (fillGames + cardGames + quizGames + spellingGames + matchingGames + timeChallengeGames) >= ach.requirement;
        case 'fill':
          switch (ach.id) {
            case 'fill_beginner':
            case 'fill_regular':
            case 'fill_expert':
            case 'fill_master':
              return parseInt(localStorage.getItem('fillGamesCompleted') || '0') >= ach.requirement;
            case 'fill_perfect':
              return parseInt(localStorage.getItem('fillPerfectScores') || '0') >= ach.requirement;
            case 'fill_speed':
              return parseInt(localStorage.getItem('fillSpeedGames') || '0') >= ach.requirement;
            case 'fill_streak':
              return parseInt(localStorage.getItem('fillStreakDays') || '0') >= ach.requirement;
            case 'fill_vocab':
              return parseInt(localStorage.getItem('fillCorrectWords') || '0') >= ach.requirement;
            default:
              return false;
          }
        case 'zodiac':
          // 星座關卡成就：檢查該星座是否已通過
          const zodiacKey = ach.id.replace('pass_', '');
          const passedAtlas = JSON.parse(localStorage.getItem('passed_atlas') || '[]');
          return passedAtlas.includes(zodiacKey);
        case 'greek':
          // 希臘神祇關卡成就：檢查該神祇關卡是否已通過
          const greekKey = ach.id.replace('pass_', '');
          const passedGreek = JSON.parse(localStorage.getItem('passed_greek') || '[]');
          return passedGreek.includes(greekKey);
        case 'vocabulary':
          // 單字達人成就：計算答對的單字本單字數量
          return parseInt(localStorage.getItem('vocabularyCorrectWords') || '0') >= ach.requirement;
        case 'ssr_special':
          // SSR 特殊成就：檢查是否已解鎖該 SSR 卡片
          const cardWord = ach.id.replace('ssr_', '');
          return ownedCards[cardWord] ? 1 : 0;
        case 'article':
          // 文章練習成就：檢查文章練習相關成就
          switch (ach.id) {
            case 'article_practice_3':
              // 檢查是否完成過文章練習
              const articlePracticeCount = parseInt(localStorage.getItem('articlePracticeCount') || '0');
              return articlePracticeCount >= ach.requirement;
            case 'article_perfect_score':
              // 檢查是否獲得過滿分
              const perfectScores = JSON.parse(localStorage.getItem('readingPerfectScores') || '[]');
              return perfectScores.length >= ach.requirement;
            default:
              // 檢查特定關卡通關成就
              if (ach.id.startsWith('article_level_')) {
                const levelNumber = parseInt(ach.id.replace('article_level_', ''));
                const completedLevels = JSON.parse(localStorage.getItem('completedReadingLevels') || '[]');
                return completedLevels.includes(levelNumber);
              }
              return false;
          }
        default:
          return false;
      }
    }

    // ====== 連動領獎邏輯 ======
    function getClaimedAchievements() {
      return JSON.parse(localStorage.getItem('claimedAchievements') || '[]');
    }
    function setClaimedAchievements(arr) {
      localStorage.setItem('claimedAchievements', JSON.stringify(arr));
    }
    function claimAchievement(ach) {
      const claimed = getClaimedAchievements();
      if (claimed.includes(ach.id)) {
        alert(`您已經領取過 ${ach.name} 的獎勵了！`);
        return;
      }
      let stars = parseInt(localStorage.getItem('totalStars') || '0');
      let reward = ach.reward;
      // 星座成就特殊處理
      if (ach.type === 'zodiac') {
        // 已領取過的星數記錄在 localStorage
        let zodiacRewards = JSON.parse(localStorage.getItem('zodiacRewards') || '{}');
        if (!zodiacRewards[ach.id]) {
          // 隨機決定星數
          const [min, max] = ach.rewardRange;
          reward = min === max ? min : Math.floor(Math.random() * (max - min + 1)) + min;
          zodiacRewards[ach.id] = reward;
          localStorage.setItem('zodiacRewards', JSON.stringify(zodiacRewards));
        } else {
          reward = zodiacRewards[ach.id];
        }
      }
      // 希臘神祇成就特殊處理
      if (ach.type === 'greek') {
        // 已領取過的星數記錄在 localStorage
        let greekRewards = JSON.parse(localStorage.getItem('greekRewards') || '{}');
        if (!greekRewards[ach.id]) {
          // 隨機決定星數
          const [min, max] = ach.rewardRange;
          reward = min === max ? min : Math.floor(Math.random() * (max - min + 1)) + min;
          greekRewards[ach.id] = reward;
          localStorage.setItem('greekRewards', JSON.stringify(greekRewards));
        } else {
          reward = greekRewards[ach.id];
        }
      }
      stars += reward;
      localStorage.setItem('totalStars', stars);
      claimed.push(ach.id);
      setClaimedAchievements(claimed);
      
      // 播放星星音效
      playStarSound();
      
      // 使用新的美觀彈窗
      showAchievementModal(ach, reward, stars);
      
      // 更新成就顯示和泡泡數量
      renderBadges();
      updateAllBadges();
      updateTotalStarsDisplay();
      // 重新檢查可領取成就通知
      setTimeout(checkAndShowClaimableNotification, 1000);
    }

    function renderBadges() {
      const container = document.getElementById('achievementBadges');
      container.innerHTML = '';
      
      // 篩選成就
      const filteredAchievements = achievements.filter(ach => {
        if (currentFilter === 'all') return true;
        return ach.type === currentFilter;
      });
      
      const claimed = getClaimedAchievements();
      // 取得已領取星座成就的星數
      let zodiacRewards = {};
      try { zodiacRewards = JSON.parse(localStorage.getItem('zodiacRewards') || '{}'); } catch {}
      // 取得已領取希臘神祇成就的星數
      let greekRewards = {};
      try { greekRewards = JSON.parse(localStorage.getItem('greekRewards') || '{}'); } catch {}
      
      // 排序成就：可領取的排在前面，已領取的排在後面
      const sortedAchievements = filteredAchievements.sort((a, b) => {
        const aUnlocked = checkAchievementUnlocked(a);
        const bUnlocked = checkAchievementUnlocked(b);
        const aClaimed = claimed.includes(a.id);
        const bClaimed = claimed.includes(b.id);
        
        // 可領取的成就排在前面
        if (aUnlocked && !aClaimed && !(bUnlocked && !bClaimed)) {
          return -1;
        }
        if (bUnlocked && !bClaimed && !(aUnlocked && !aClaimed)) {
          return 1;
        }
        
        // 已領取的成就排在後面
        if (aClaimed && !bClaimed) {
          return 1;
        }
        if (bClaimed && !aClaimed) {
          return -1;
        }
        
        // 如果都是已領取或都是未達成，按原始順序排列
        return 0;
      });
      
      // 渲染排序後的成就卡片到網格中
      sortedAchievements.forEach(ach => {
        const unlocked = checkAchievementUnlocked(ach);
        const isClaimed = claimed.includes(ach.id);
        const currentProgress = getAchievementProgress(ach);
        const progressPercentage = getProgressPercentage(ach);
        
        // 創建成就卡片
        const card = document.createElement('div');
        card.className = 'achievement-card';
        
        // 添加狀態 class
        if (isClaimed) {
          card.classList.add('claimed');
        } else if (unlocked) {
          card.classList.add('claimable');
        } else {
          card.classList.add('locked');
        }
        
        // 成就圖示
        const icon = document.createElement('div');
        icon.className = 'achievement-card-icon';
        icon.textContent = ach.icon;
        card.appendChild(icon);
        
        // 成就內容區
        const content = document.createElement('div');
        content.className = 'achievement-card-content';
        
        // 成就標題
        const title = document.createElement('div');
        title.className = 'achievement-card-title';
        title.textContent = ach.name;
        content.appendChild(title);
        
        // 成就說明
        const desc = document.createElement('div');
        desc.className = 'achievement-card-desc';
        desc.textContent = ach.description;
        content.appendChild(desc);
        
        // 進度條
        const progress = document.createElement('div');
        progress.className = 'achievement-progress';
        const progressBar = document.createElement('div');
        progressBar.className = 'achievement-progress-bar';
        progressBar.style.width = progressPercentage + '%';
        progress.appendChild(progressBar);
        
        const progressText = document.createElement('div');
        progressText.className = 'achievement-progress-text';
        progressText.textContent = `${currentProgress} / ${ach.requirement}`;
        progress.appendChild(progressText);
        content.appendChild(progress);
        
        // 獎勵星星
        const reward = document.createElement('div');
        reward.className = 'achievement-reward';
        let rewardText = '';
        if (ach.type === 'zodiac') {
          if (isClaimed) {
            rewardText = `${zodiacRewards[ach.id] || '?'} ⭐`;
          } else {
            const [min, max] = ach.rewardRange;
            rewardText = `${min === max ? min : `${min}~${max}`} ⭐`;
          }
        } else if (ach.type === 'greek') {
          if (isClaimed) {
            rewardText = `${greekRewards[ach.id] || '?'} ⭐`;
          } else {
            const [min, max] = ach.rewardRange;
            rewardText = `${min === max ? min : `${min}~${max}`} ⭐`;
          }
        } else {
          rewardText = `${ach.reward} ⭐`;
        }
        reward.textContent = rewardText;
        content.appendChild(reward);
        
        // 狀態標籤
        const status = document.createElement('div');
        status.className = 'achievement-status';
        if (isClaimed) {
          status.classList.add('achievement-status-claimed');
          status.textContent = '✓ 已領取';
        } else if (unlocked) {
          status.classList.add('achievement-status-claimable');
          status.textContent = '🎁 可領取';
        } else {
          status.classList.add('achievement-status-locked');
          status.textContent = '🔒 未完成';
        }
        content.appendChild(status);
        
        card.appendChild(content);
        
        // 領獎按鈕
        if (unlocked && !isClaimed) {
          const claimBtn = document.createElement('button');
          claimBtn.className = 'achievement-claim-btn';
          claimBtn.textContent = '領取獎勵';
          claimBtn.onclick = () => claimAchievement(ach);
          card.appendChild(claimBtn);
        }
        
        container.appendChild(card);
      });
    }

    function initializeBackgroundMusic() {
      const bgm = document.getElementById('bgm');

      if (!bgm || !muteToggle) return;

      bgm.volume = 0.3;

      const playMusic = () => {
        bgm.play().catch(e => console.error("BGM play failed:", e));
        muteToggle.textContent = '🔈';
        localStorage.setItem('bgmPlaying', 'true');
      };

      const pauseMusic = () => {
        bgm.pause();
        muteToggle.textContent = '🔇';
        localStorage.setItem('bgmPlaying', 'false');
      };

      muteToggle.addEventListener('click', () => {
        if (bgm.paused) {
          playMusic();
        } else {
          pauseMusic();
        }
      });

      // 頁面載入時同步狀態
      if (localStorage.getItem('bgmPlaying') === 'true') {
        bgm.currentTime = parseFloat(localStorage.getItem('bgmTime') || '0');
        playMusic();
      } else {
        pauseMusic();
      }

      // 離開頁面前儲存時間
      window.addEventListener('beforeunload', () => {
        localStorage.setItem('bgmTime', bgm.currentTime.toString());
      });
    }

    // 新增：影片播放相關函數
    function showVideoModal(achievement) {
      const modal = document.getElementById('videoModal');
      const title = document.getElementById('videoModalTitle');
      const player = document.getElementById('videoPlayer');
      
      // 設置標題
      title.textContent = `${achievement.name} - 相關影片`;
      
      // 設置影片 URL
      if (achievement.youtube) {
        // 將 YouTube URL 轉換為嵌入格式
        let videoUrl = achievement.youtube;
        if (videoUrl.includes('youtube.com/watch?v=')) {
          const videoId = videoUrl.split('v=')[1].split('&')[0];
          videoUrl = `https://www.youtube.com/embed/${videoId}`;
        } else if (videoUrl.includes('youtu.be/')) {
          const videoId = videoUrl.split('youtu.be/')[1];
          videoUrl = `https://www.youtube.com/embed/${videoId}`;
        }
        player.src = videoUrl;
      }
      
      // 顯示 Modal
      modal.style.display = 'flex';
      
      // 添加點擊外部關閉功能
      modal.onclick = function(e) {
        if (e.target === modal) {
          closeVideoModal();
        }
      };
    }
    
    function closeVideoModal() {
      const modal = document.getElementById('videoModal');
      const player = document.getElementById('videoPlayer');
      
      // 停止影片播放
      player.src = '';
      
      // 隱藏 Modal
      modal.style.display = 'none';
      
      // 移除點擊事件
      modal.onclick = null;
    }
    
    // 清理每日簽到相關的 localStorage 資料
    function migrateRemoveDailyCheckin() {
      // 清理每日簽到相關的 localStorage keys
      const dailyKeys = [
        'loginDays',
        'lastLoginDate',
        'dailyReward',
        'dailyLogin',
        'checkInHistory',
        'rewardHistory',
        'dailyData'
      ];
      
      dailyKeys.forEach(key => {
        if (localStorage.getItem(key)) {
          localStorage.removeItem(key);
          console.log(`🗑️ 已移除每日簽到資料: ${key}`);
        }
      });
      
      console.log('✅ 每日簽到資料清理完成');
    }
    
    // 新增：為 SSR 卡片成就添加影片連結
    function addSSRVideosToAchievements() {
      if (!window.allCards) return;
      
      // 為每張 SSR 卡片創建對應的成就
      const ssrCards = allCards.filter(card => card.rarity === '超稀有');
      
      ssrCards.forEach(card => {
        // 檢查是否已存在該成就
        const existingAchievement = achievements.find(ach => ach.id === `ssr_${card.word}`);
        if (!existingAchievement) {
          achievements.push({
            id: `ssr_${card.word}`,
            name: `解鎖 SSR：${card.zh}`,
            requirement: 1,
            reward: 50,
            icon: '🌟',
            type: 'ssr_special',
            description: `解鎖超稀有卡片「${card.zh}」`,
            youtube: card.youtube || null // 如果卡片有 YouTube 連結就使用
          });
        }
      });
    }

    // 新增：open+Enter 一鍵領取所有成就
    (function(){
      let keySequence = '';
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          if (keySequence.toLowerCase() === 'open') {
            claimAllUnlockedAchievements();
            keySequence = '';
          } else {
            keySequence = '';
          }
        } else if (e.key.length === 1) {
          keySequence += e.key;
          if (keySequence.length > 10) keySequence = keySequence.slice(-10);
        }
      });
    })();

    // 新增：一鍵領取所有已解鎖成就
    function claimAllUnlockedAchievements() {
      const claimed = getClaimedAchievements();
      let count = 0;
      achievements.forEach(ach => {
        if (checkAchievementUnlocked(ach) && !claimed.includes(ach.id)) {
          claimAchievement(ach);
          count++;
        }
      });
      if (count > 0) {
        alert(`🎉 已自動領取 ${count} 個成就！`);
        // 更新泡泡數量（因為claimAchievement已經會更新，這裡確保最後更新一次）
        updateAllBadges();
        // 重新檢查可領取成就通知
        setTimeout(checkAndShowClaimableNotification, 1000);
      } else {
        alert('目前沒有可領取的成就。');
      }
    }
  </script>
