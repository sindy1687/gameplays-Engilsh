<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡片收藏冊</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
      display: flex;
    }

    /* 左側快捷列 */
    .card-collection-sidebar {
      width: 80px;
      background: rgba(10, 20, 40, 0.95);
      border-right: 2px solid #00ffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 10px;
      gap: 15px;
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      z-index: 1000;
    }

    .card-collection-nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      width: 100%;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 5px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: #fff;
      width: 100%;
    }

    .nav-item:hover {
      background: rgba(0, 255, 255, 0.1);
    }

    .nav-item.active {
      background: rgba(0, 255, 255, 0.2);
      border: 2px solid #00ffff;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
    }

    .nav-icon {
      font-size: 1.5rem;
    }

    .nav-label {
      font-size: 0.7rem;
      text-align: center;
    }

    .star-display {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 170, 0, 0.2));
      border: 2px solid #ffd700;
      border-radius: 10px;
      padding: 8px 5px;
      text-align: center;
      margin-bottom: 10px;
    }

    .star-count {
      font-size: 0.8rem;
      color: #ffd700;
      font-weight: bold;
    }

    /* 主內容區 */
    .card-collection-page {
      flex: 1;
      margin-left: 80px;
      padding: 20px;
      overflow-y: auto;
    }

    /* 頁面標題 */
    .card-collection-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .card-collection-header h1 {
      font-size: 2.5rem;
      color: #00ffff;
      text-shadow: 0 0 20px #00ffff;
      margin-bottom: 10px;
    }

    /* 收藏總覽區 */
    .collection-summary-panel {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid #a259ff;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      display: flex;
      gap: 30px;
      box-shadow: 0 10px 40px rgba(162, 89, 255, 0.2);
    }

    .summary-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .collection-circle-progress {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: conic-gradient(#00ffff var(--progress), rgba(255, 255, 255, 0.1) 0);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .collection-circle-progress::before {
      content: '';
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(10, 20, 40, 0.9);
    }

    .progress-text {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .progress-percentage {
      font-size: 2rem;
      font-weight: bold;
      color: #00ffff;
    }

    .progress-label {
      font-size: 0.8rem;
      color: #aaa;
    }

    .summary-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      width: 100%;
    }

    .stat-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #a259ff;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #a259ff;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #aaa;
    }

    .summary-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .collection-reward-track {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #a259ff;
      border-radius: 10px;
      padding: 15px;
    }

    .reward-track-title {
      font-size: 1rem;
      color: #a259ff;
      margin-bottom: 15px;
    }

    .reward-milestones {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .reward-milestone {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
    }

    .reward-milestone.completed {
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid #00ff00;
    }

    .reward-milestone.completed .milestone-icon {
      color: #00ff00;
    }

    .milestone-icon {
      font-size: 1.2rem;
      color: #666;
    }

    .milestone-text {
      flex: 1;
      font-size: 0.9rem;
    }

    .milestone-reward {
      font-size: 0.8rem;
      color: #ffd700;
    }

    /* 中間主要內容 */
    .series-main-panel {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    /* 左欄：系列列表 */
    .series-list-panel {
      width: 300px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid #00ffff;
      border-radius: 20px;
      padding: 20px;
      max-height: 600px;
      overflow-y: auto;
    }

    .series-list-panel h3 {
      color: #00ffff;
      margin-bottom: 15px;
      text-align: center;
    }

    .series-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .series-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #00ffff;
      border-radius: 10px;
      padding: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .series-item:hover {
      background: rgba(0, 255, 255, 0.1);
      transform: translateX(5px);
    }

    .series-item.active {
      background: rgba(0, 255, 255, 0.2);
      border: 2px solid #00ffff;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
    }

    .series-item-icon {
      font-size: 1.5rem;
      margin-bottom: 5px;
    }

    .series-item-name {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .series-item-progress {
      font-size: 0.8rem;
      color: #aaa;
    }

    .series-missing-dot {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 20px;
      height: 20px;
      background: #ff6b6b;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: bold;
    }

    /* 右欄：系列卡片收藏牆 */
    .series-card-wall {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid #ff6b6b;
      border-radius: 20px;
      padding: 20px;
    }

    .series-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .series-title {
      font-size: 1.5rem;
      color: #ff6b6b;
    }

    .series-info-btn {
      background: linear-gradient(135deg, #ff6b6b, #ff0000);
      border: none;
      padding: 8px 15px;
      border-radius: 20px;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .series-progress-bar {
      flex: 1;
      max-width: 300px;
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    .series-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff6b6b, #ff0000);
      transition: width 0.5s ease;
    }

    .series-progress-text {
      font-size: 0.9rem;
      color: #aaa;
    }

    /* 搜尋與篩選 */
    .search-filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-filter-bar input {
      flex: 1;
      min-width: 200px;
      padding: 10px 15px;
      border: 1px solid #00ffff;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
    }

    .search-filter-bar select {
      padding: 10px 15px;
      border: 1px solid #00ffff;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      cursor: pointer;
    }

    /* 卡片格子 */
    .collection-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 15px;
    }

    .collection-card {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid #555;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .collection-card:hover {
      transform: scale(1.05);
    }

    .collection-card.owned {
      background: rgba(255, 255, 255, 0.1);
    }

    .collection-card.owned.rarity-ssr {
      border-color: #ffd700;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    }

    .collection-card.owned.rarity-sr,
    .collection-card.owned.rarity-a {
      border-color: #a259ff;
      box-shadow: 0 0 10px rgba(162, 89, 255, 0.3);
    }

    .collection-card.owned.rarity-r {
      border-color: #00ffff;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
    }

    .collection-card.missing {
      border-color: #333;
      border-style: dashed;
      background: rgba(100, 100, 100, 0.1);
      opacity: 0.6;
    }

    .card-number {
      font-size: 0.7rem;
      color: #aaa;
      margin-bottom: 5px;
    }

    .card-image {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 5px;
    }

    /* 媒體容器 */
    .card-media-container {
      width: 80px;
      height: 80px;
      margin-bottom: 5px;
      position: relative;
    }

    .card-media {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }

    .card-video {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      background: #111;
    }

    .card-fallback {
      display: none;
    }

    .card-name {
      font-size: 0.8rem;
      color: #fff;
      margin-bottom: 5px;
    }

    .card-rarity {
      font-size: 0.7rem;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .card-rarity.rarity-ssr {
      background: rgba(255, 215, 0, 0.2);
      color: #ffd700;
    }

    .card-rarity.rarity-sr,
    .card-rarity.rarity-a {
      background: rgba(162, 89, 255, 0.2);
      color: #a259ff;
    }

    .card-rarity.rarity-r {
      background: rgba(0, 255, 255, 0.2);
      color: #00ffff;
    }

    .card-missing-icon {
      font-size: 2rem;
      color: #666;
      margin-bottom: 5px;
    }

    .card-missing-text {
      font-size: 0.7rem;
      color: #666;
    }

    .card-owned-star {
      position: absolute;
      top: 5px;
      right: 5px;
      color: #ffd700;
      font-size: 0.8rem;
    }

    /* 稀有度說明 */
    .rarity-legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }

    .rarity-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .rarity-legend-item .legend-box {
      width: 20px;
      height: 20px;
      border-radius: 4px;
    }

    .rarity-legend-item .legend-box.ssr {
      background: #ffd700;
      border: 2px solid #ffd700;
    }

    .rarity-legend-item .legend-box.sr {
      background: #a259ff;
      border: 2px solid #a259ff;
    }

    .rarity-legend-item .legend-box.r {
      background: #00ffff;
      border: 2px solid #00ffff;
    }

    /* 系列完成獎勵 */
    .series-reward-panel {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid #ffd700;
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
      display: none;
    }

    .series-reward-panel.show {
      display: block;
    }

    .reward-panel-title {
      font-size: 1.2rem;
      color: #ffd700;
      margin-bottom: 15px;
    }

    .reward-items {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .reward-item {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 170, 0, 0.2));
      border: 1px solid #ffd700;
      border-radius: 10px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .claim-reward-btn {
      background: linear-gradient(135deg, #00ff00, #00cc00);
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }

    .claim-reward-btn:disabled {
      background: #666;
      cursor: not-allowed;
    }

    /* 卡片詳情 Modal - 美化版 */
    .card-detail-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(5px);
    }

    .card-detail-modal.active {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(135deg, rgba(20, 10, 40, 0.95), rgba(30, 20, 60, 0.95));
      border: 3px solid transparent;
      border-image: linear-gradient(135deg, #00ffff, #a259ff, #ffd700);
      border-image-slice: 1;
      border-radius: 24px;
      padding: 0;
      max-width: 700px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.3), 0 0 60px rgba(162, 89, 255, 0.2);
      display: flex;
      flex-direction: row;
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(255, 0, 0, 0.8);
      border: 2px solid #ff0000;
      color: #fff;
      font-size: 1.8rem;
      cursor: pointer;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
    }

    .modal-close:hover {
      background: rgba(255, 0, 0, 1);
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(255, 0, 0, 0.8);
    }

    /* 彈窗左側：媒體區 */
    .modal-media-section {
      flex: 0 0 45%;
      padding: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 24px 0 0 24px;
    }

    .modal-card-media-container {
      width: 100%;
      max-width: 280px;
      position: relative;
    }

    .card-detail-media-wrap {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 3 / 4;
      border-radius: 20px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.35);
      border: 2px solid rgba(120, 180, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-detail-media,
    .card-detail-image,
    .card-detail-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 18px;
      display: block;
    }

    .card-detail-missing-media {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #dbe7ff;
    }

    .card-detail-question {
      font-size: 80px;
      font-weight: 900;
    }

    .card-detail-missing-media p {
      font-size: 1.2rem;
      margin-top: 10px;
    }

    .modal-card-image {
      width: 100%;
      height: auto;
      border-radius: 16px;
      display: block;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
      border: 2px solid rgba(0, 255, 255, 0.5);
    }

    .modal-card-video {
      width: 100%;
      height: auto;
      border-radius: 16px;
      display: block;
      object-fit: contain;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
      border: 2px solid rgba(0, 255, 255, 0.5);
    }

    .modal-card-fallback {
      display: none;
      width: 100%;
      height: auto;
      border-radius: 16px;
    }

    /* 彈窗右側：資訊區 */
    .modal-info-section {
      flex: 1;
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
    }

    .modal-card-name {
      font-size: 1.8rem;
      color: #fff;
      font-weight: bold;
      margin-bottom: 5px;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }

    .card-detail-english {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(24, 245, 255, 0.12);
      border: 1px solid rgba(24, 245, 255, 0.35);
      margin: 10px 0;
    }

    .english-label {
      color: #cfd6ff;
      font-size: 14px;
    }

    #cardEnglishWord {
      font-size: 22px;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    .pronounce-btn {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      background: linear-gradient(135deg, #18f5ff, #8b5cf6);
      color: #071026;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .pronounce-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    .modal-card-series {
      font-size: 1.1rem;
      color: #a259ff;
      margin-bottom: 5px;
    }

    .modal-card-rarity {
      font-size: 1.3rem;
      font-weight: bold;
      padding: 8px 20px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 10px;
      text-align: center;
    }

    .modal-card-rarity.rarity-ssr {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 170, 0, 0.3));
      color: #ffd700;
      border: 2px solid #ffd700;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
    }

    .modal-card-rarity.rarity-sr,
    .modal-card-rarity.rarity-a {
      background: linear-gradient(135deg, rgba(162, 89, 255, 0.3), rgba(138, 43, 226, 0.3));
      color: #a259ff;
      border: 2px solid #a259ff;
      box-shadow: 0 0 15px rgba(162, 89, 255, 0.5);
    }

    .modal-card-rarity.rarity-r {
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.3), rgba(0, 204, 204, 0.3));
      color: #00ffff;
      border: 2px solid #00ffff;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
    }

    .modal-card-description {
      color: #e0e0e0;
      line-height: 1.6;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .modal-obtain-method {
      background: rgba(255, 107, 107, 0.15);
      border: 2px solid #ff6b6b;
      border-radius: 12px;
      padding: 15px;
    }

    .modal-obtain-method h4 {
      color: #ff6b6b;
      margin-bottom: 8px;
      font-size: 1.1rem;
    }

    .modal-obtain-method p {
      color: #e0e0e0;
      line-height: 1.5;
    }

    /* 手機版 RWD - 改為上下排列 */
    @media (max-width: 768px) {
      .modal-content {
        flex-direction: column;
        max-width: 95%;
        max-height: 90vh;
        border-radius: 20px;
      }

      .modal-media-section {
        flex: 0 0 auto;
        padding: 20px;
        border-radius: 20px 20px 0 0;
      }

      .modal-card-media-container {
        max-width: 200px;
      }

      .modal-info-section {
        flex: 1;
        padding: 20px;
      }

      .modal-card-name {
        font-size: 1.5rem;
      }

      .modal-card-rarity {
        font-size: 1.1rem;
        padding: 6px 15px;
      }

            <!-- 獎勵項目將由 JS 動態生成 -->

  <!-- 卡片詳情 Modal -->
  <div class="card-detail-modal" id="cardModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeCardModal()">&times;</button>
      <div class="modal-media-section">
        <div class="card-detail-media-wrap">
          <div class="modal-card-media-container" id="modalCardMediaContainer">
            <img class="modal-card-image" id="modalCardImage" src="" alt="">
          </div>
        </div>
      </div>
      <div class="modal-info-section">
        <div class="modal-card-name" id="modalCardName"></div>
        <div class="card-detail-english" id="cardDetailEnglish">
          <span class="english-label">英文：</span>
          <strong id="cardEnglishWord"></strong>
          <button class="pronounce-btn" id="cardPronounceBtn">🔊 發音</button>
        </div>
        <div class="modal-card-series" id="modalCardSeries"></div>
        <div class="modal-card-rarity" id="modalCardRarity"></div>
        <div class="modal-card-description" id="modalCardDescription"></div>
        <div class="modal-obtain-method" id="modalObtainMethod">

  <!-- 引入必要的 JS -->
  <script src="js/cards.js"></script>
  <script src="js/userData.js"></script>
  <script src="js/cardStorage.js"></script>
  <script src="js/seriesGacha.js"></script>

  <script>
    // 等待 DOM 和 allCards 載入
    document.addEventListener('DOMContentLoaded', function() {
      console.log('📦 DOM 已載入，等待 allCards...');
      
      // 等待 allCards 載入
      let checkInterval = setInterval(() => {
        if (window.allCards && Array.isArray(window.allCards) && window.allCards.length > 0) {
          clearInterval(checkInterval);
          console.log('✅ allCards 載入成功，共', window.allCards.length, '張卡片');
          initCollectionPage();
        }
      }, 100);

      // 超時保護 - 增加到 15 秒
      setTimeout(() => {
        clearInterval(checkInterval);
        console.error('❌ allCards 載入超時');
        
        // 檢查狀態
        if (typeof window.allCards === 'undefined') {
          console.error('window.allCards 未定義 - js/cards.js 可能未正確載入');
          alert('卡片資料載入失敗，請重新整理頁面');
        } else if (!Array.isArray(window.allCards)) {
          console.error('window.allCards 不是陣列');
          alert('卡片資料格式錯誤，請重新整理頁面');
        } else if (window.allCards.length === 0) {
          console.error('window.allCards 是空陣列');
          alert('卡片資料為空，請重新整理頁面');
        }
      }, 15000);
    });

    let selectedSeries = null;
    let seriesRewards = {};

    function initCollectionPage() {
      console.log('🚀 卡片收藏冊頁面初始化...');
      
      // 載入系列獎勵配置
      loadSeriesRewards();
      
      // 更新收藏總覽
      updateCollectionSummary();
      
      // 渲染系列列表
      renderSeriesList();
      
      // 預設選擇第一個系列
      if (window.allCards.length > 0) {
        const firstSeries = getAllSeries()[0];
        if (firstSeries) {
          selectSeries(firstSeries);
        }
      }
      
      // 更新星星顯示
      updateStarDisplay();
      
      // 綁定搜尋和篩選事件
      document.getElementById('searchInput').addEventListener('input', handleSearch);
      document.getElementById('filterSelect').addEventListener('change', handleFilter);
      
      // 綁定領取獎勵按鈕
      document.getElementById('claimRewardBtn').addEventListener('click', claimSeriesReward);
      
      console.log('✅ 卡片收藏冊頁面初始化完成');
    }

    function loadSeriesRewards() {
      const claimedRewards = JSON.parse(localStorage.getItem('claimedCardSetRewards') || '{}');
      seriesRewards = claimedRewards;
    }

    function updateStarDisplay() {
      if (window.LinkageSystem && LinkageSystem.stars) {
        const stars = LinkageSystem.stars.get();
        document.getElementById('sidebarStarCount').textContent = `⭐ ${stars}`;
      }
    }

    function updateCollectionSummary() {
      const ownedCards = LinkageSystem.cards.getOwnedCards();
      const totalCards = window.allCards.length;
      const collectedCards = Object.keys(ownedCards).length;
      
      // 計算完成率
      const completionRate = totalCards > 0 ? Math.round((collectedCards / totalCards) * 100) : 0;
      
      // 更新圓形進度
      document.getElementById('circleProgress').style.setProperty('--progress', completionRate + '%');
      document.getElementById('overallPercentage').textContent = completionRate + '%';
      
      // 計算稀有卡片數量（SSR + SR）
      let rareCount = 0;
      window.allCards.forEach(card => {
        if (ownedCards[card.word] && (card.rarity === '超稀有' || card.rarity === '稀有')) {
          rareCount++;
        }
      });
      
      // 計算系列完成數
      const allSeries = getAllSeries();
      let completedSeriesCount = 0;
      allSeries.forEach(series => {
        const seriesCards = getSeriesCards(series);
        const collectedInSeries = seriesCards.filter(card => ownedCards[card.word]).length;
        if (collectedInSeries === seriesCards.length) {
          completedSeriesCount++;
        }
      });
      
      // 更新顯示
      document.getElementById('totalCollected').textContent = `${collectedCards} / ${totalCards}`;
      document.getElementById('completedSeries').textContent = completedSeriesCount;
      document.getElementById('incompleteSeries').textContent = allSeries.length - completedSeriesCount;
      document.getElementById('rareCards').textContent = rareCount;
      
      // 更新獎勵里程碑
      updateRewardMilestones(collectedCards);
    }

    function updateRewardMilestones(collectedCards) {
      const milestones = [
        { count: 50, reward: '⭐ 500' },
        { count: 100, reward: '⭐ 1000 + 🎫 5' },
        { count: 150, reward: '⭐ 2000 + 🎫 10' },
        { count: 200, reward: '⭐ 3000 + 🎫 15' },
        { count: 250, reward: '⭐ 5000 + 🎫 20' }
      ];
      
      const rewardMilestones = document.getElementById('rewardMilestones');
      rewardMilestones.innerHTML = milestones.map(milestone => {
        const completed = collectedCards >= milestone.count;
        return `
          <div class="reward-milestone ${completed ? 'completed' : ''}">
            <span class="milestone-icon">${completed ? '✓' : '○'}</span>
            <span class="milestone-text">${milestone.count} 張</span>
            <span class="milestone-reward">${milestone.reward}</span>
          </div>
        `;
      }).join('');
    }

    function renderSeriesList() {
      const ownedCards = LinkageSystem.cards.getOwnedCards();
      const allSeries = getAllSeries();
      const seriesList = document.getElementById('seriesList');
      
      // 計算每個系列的收集率
      const seriesData = allSeries.map(series => {
        const seriesCards = getSeriesCards(series);
        const total = seriesCards.length;
        const collected = seriesCards.filter(card => ownedCards[card.word]).length;
        const missing = total - collected;
        const isCompleted = collected === total;
        
        return {
          name: series,
          total,
          collected,
          missing,
          isCompleted
        };
      });
      
      // 依照收集率排序
      seriesData.sort((a, b) => b.collected - a.collected);
      
      // 渲染系列卡片
      seriesList.innerHTML = seriesData.map(series => {
        return `
          <div class="series-item ${selectedSeries === series.name ? 'active' : ''}" onclick="selectSeries('${series.name}')">
            <div class="series-item-icon">📁</div>
            <div class="series-item-name">${series.name}</div>
            <div class="series-item-progress">${series.collected} / ${series.total}</div>
            ${series.missing > 0 ? `<div class="series-missing-dot">${series.missing}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    function selectSeries(seriesName) {
      selectedSeries = seriesName;
      
      // 更新系列列表的高亮
      renderSeriesList();
      
      // 更新標題
      document.getElementById('seriesTitle').textContent = seriesName;
      
      // 渲染該系列的卡片
      renderSeriesCards(seriesName);
      
      // 更新系列進度
      updateSeriesProgress(seriesName);
      
      // 更新獎勵區
      updateSeriesReward(seriesName);
    }

    function updateSeriesProgress(seriesName) {
      const ownedCards = LinkageSystem.cards.getOwnedCards();
      const seriesCards = getSeriesCards(seriesName);
      const total = seriesCards.length;
      const collected = seriesCards.filter(card => ownedCards[card.word]).length;
      const rate = total > 0 ? Math.round((collected / total) * 100) : 0;
      
      document.getElementById('seriesProgressFill').style.width = rate + '%';
      document.getElementById('seriesProgressText').textContent = `${collected} / ${total} (${rate}%)`;
    }

    function renderSeriesCards(seriesName) {
      const ownedCards = LinkageSystem.cards.getOwnedCards();
      const seriesCards = getSeriesCards(seriesName);
      const cardGrid = document.getElementById('cardGrid');
      
      // 依照編號排序
      seriesCards.sort((a, b) => {
        const aIndex = window.allCards.indexOf(a);
        const bIndex = window.allCards.indexOf(b);
        return aIndex - bIndex;
      });
      
      // 渲染卡片
      cardGrid.innerHTML = seriesCards.map((card, index) => {
        const isOwned = ownedCards[card.word];
        const cardNumber = String(index + 1).padStart(3, '0');
        
        if (isOwned) {
          const rarityClass = card.rarity === '超稀有' ? 'rarity-ssr' : card.rarity === '稀有' ? 'rarity-sr' : 'rarity-r';
          const rarityText = card.rarity === '超稀有' ? 'SSR' : card.rarity === '稀有' ? 'A' : 'R';
          const media = getCardMedia(card);
          
          // 判斷顯示影片還是圖片（參考 cards.html 的渲染模式）
          let mediaElement;
          let imgSrc = media.src;
          
          if (imgSrc && imgSrc.endsWith('.mp4')) {
            // mp4 檔案：用 video 標籤擷取第一幀作為縮圖
            mediaElement = `
              <video 
                class="card-media card-video" 
                preload="metadata" 
                muted 
                loop 
                playsinline
                data-fallback="${media.fallback}"
                onmouseenter="this.play().catch(() => {})"
                onmouseleave="this.pause(); this.currentTime = 0;"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
              >
                <source src="${imgSrc}" type="video/mp4">
              </video>
              <img class="card-image card-fallback" src="${media.fallback}" alt="${card.zh}" style="display:none;" onerror="this.onerror=null; this.src='img/cards/default.png';">
            `;
          } else {
            // 一般圖片
            mediaElement = `<img class="card-image" src="${imgSrc}" alt="${card.zh}" onerror="this.onerror=null; this.src='${media.fallback}';">`;
          }
          
          return `
            <div class="collection-card owned ${rarityClass}" onclick="showCardDetail('${card.word}')">
              <span class="card-owned-star">⭐</span>
              <div class="card-number">#${cardNumber}</div>
              <div class="card-media-container">
                ${mediaElement}
              </div>
              <div class="card-name">${card.zh}</div>
              <div class="card-rarity ${rarityClass}">${rarityText}</div>
            </div>
          `;
        } else {
          const rarityClass = card.rarity === '超稀有' ? 'rarity-ssr' : card.rarity === '稀有' ? 'rarity-sr' : 'rarity-r';
          const rarityText = card.rarity === '超稀有' ? 'SSR' : card.rarity === '稀有' ? 'A' : 'R';
          
          // 未獲得卡片不顯示影片，只顯示問號
          return `
            <div class="collection-card missing" onclick="showMissingCardDetail('${card.word}')">
              <div class="card-number">#${cardNumber}</div>
              <div class="card-missing-icon">?</div>
              <div class="card-missing-text">尚未獲得</div>
              <div class="card-rarity ${rarityClass}">${rarityText}</div>
            </div>
          `;
        }
      }).join('');
    }

    function updateSeriesReward(seriesName) {
      const ownedCards = LinkageSystem.cards.getOwnedCards();
      const seriesCards = getSeriesCards(seriesName);
      const collected = seriesCards.filter(card => ownedCards[card.word]).length;
      const total = seriesCards.length;
      const isCompleted = collected === total;
      
      const rewardKey = `set_${seriesName}`;
      const isClaimed = seriesRewards[rewardKey];
      
      const rewardPanel = document.getElementById('seriesRewardPanel');
      
      if (isCompleted && !isClaimed) {
        rewardPanel.classList.add('show');
        
        // 計算獎勵
        const rewardStars = total >= 8 ? 5000 : total >= 5 ? 3000 : 1000;
        const rewardTickets = Math.floor(total / 5);
        
        document.getElementById('seriesRewardItems').innerHTML = `
          <div class="reward-item">
            <span>⭐</span>
            <span>${rewardStars}</span>
          </div>
          <div class="reward-item">
            <span>🎫</span>
            <span>${rewardTickets}</span>
          </div>
        `;
        
        document.getElementById('claimRewardBtn').disabled = false;
        document.getElementById('claimRewardBtn').textContent = '領取獎勵';
      } else if (isClaimed) {
        rewardPanel.classList.add('show');
        document.getElementById('seriesRewardItems').innerHTML = '<div class="reward-item">✓ 已領取</div>';
        document.getElementById('claimRewardBtn').disabled = true;
        document.getElementById('claimRewardBtn').textContent = '已領取';
      } else {
        rewardPanel.classList.remove('show');
      }
    }

    function claimSeriesReward() {
      if (!selectedSeries) return;
      
      const rewardKey = `set_${selectedSeries}`;
      if (seriesRewards[rewardKey]) {
        alert('已經領取過此獎勵');
        return;
      }
      
      const seriesCards = getSeriesCards(selectedSeries);
      const total = seriesCards.length;
      const rewardStars = total >= 8 ? 5000 : total >= 5 ? 3000 : 1000;
      const rewardTickets = Math.floor(total / 5);
      
      // 發放獎勵
      if (window.LinkageSystem && LinkageSystem.stars) {
        LinkageSystem.stars.add(rewardStars);
      }
      
      // 發放抽卡券
      const currentTickets = parseInt(localStorage.getItem('gachaTickets') || '0');
      localStorage.setItem('gachaTickets', (currentTickets + rewardTickets).toString());
      
      // 標記為已領取
      seriesRewards[rewardKey] = {
        claimed: true,
        claimedAt: new Date().toISOString(),
        stars: rewardStars,
        tickets: rewardTickets
      };
      localStorage.setItem('claimedCardSetRewards', JSON.stringify(seriesRewards));
      
      // 更新顯示
      updateSeriesReward(selectedSeries);
      updateCollectionSummary();
      updateStarDisplay();
      
      alert(`🎉 恭喜獲得獎勵！\n⭐ ${rewardStars} 星星\n🎫 ${rewardTickets} 抽卡券`);
    }

    function showCardDetail(cardWord) {
      const card = window.allCards.find(c => c.word === cardWord);
      if (!card) return;
      
      const modal = document.getElementById('cardModal');
      const rarityClass = card.rarity === '超稀有' ? 'rarity-ssr' : card.rarity === '稀有' ? 'rarity-sr' : 'rarity-r';
      const rarityText = card.rarity === '超稀有' ? 'SSR' : card.rarity === '稀有' ? 'A' : 'R';
      const isOwned = true; // 已獲得卡片
      
      // 使用新的媒體渲染函式
      const modalMediaContainer = document.getElementById('modalCardMediaContainer');
      modalMediaContainer.innerHTML = renderCardModalMedia(card, isOwned);
      
      document.getElementById('modalCardName').textContent = card.zh;
      document.getElementById('modalCardSeries').textContent = `系列：${card.category || '未知'}`;
      document.getElementById('modalCardRarity').textContent = rarityText;
      document.getElementById('modalCardRarity').className = `modal-card-rarity ${rarityClass}`;
      document.getElementById('modalCardDescription').textContent = card.en || card.zh;
      document.getElementById('modalObtainMethod').style.display = 'none';
      
      // 設定英文單字
      const englishWord = getCardEnglish(card);
      document.getElementById('cardEnglishWord').textContent = englishWord;
      
      // 綁定發音按鈕
      const pronounceBtn = document.getElementById('cardPronounceBtn');
      pronounceBtn.onclick = function() {
        speakCardEnglish(englishWord);
      };
      
      modal.classList.add('active');
    }

    function showMissingCardDetail(cardWord) {
      const card = window.allCards.find(c => c.word === cardWord);
      if (!card) return;
      
      const modal = document.getElementById('cardModal');
      const rarityClass = card.rarity === '超稀有' ? 'rarity-ssr' : card.rarity === '稀有' ? 'rarity-sr' : 'rarity-r';
      const rarityText = card.rarity === '超稀有' ? 'SSR' : card.rarity === '稀有' ? 'A' : 'R';
      const isOwned = false; // 未獲得卡片
      
      // 使用新的媒體渲染函式（未獲得卡片顯示問號）
      const modalMediaContainer = document.getElementById('modalCardMediaContainer');
      modalMediaContainer.innerHTML = renderCardModalMedia(card, isOwned);
      
      document.getElementById('modalCardName').textContent = '尚未獲得';
      document.getElementById('modalCardSeries').textContent = `系列：${card.category || '未知'}`;
      document.getElementById('modalCardRarity').textContent = rarityText;
      document.getElementById('modalCardRarity').className = `modal-card-rarity ${rarityClass}`;
      document.getElementById('modalCardDescription').textContent = card.zh || '未知卡片';
      document.getElementById('modalObtainMethod').style.display = 'block';
      
      // 設定英文單字（未獲得卡片也顯示英文）
      const englishWord = getCardEnglish(card);
      document.getElementById('cardEnglishWord').textContent = englishWord;
      
      // 綁定發音按鈕
      const pronounceBtn = document.getElementById('cardPronounceBtn');
      pronounceBtn.onclick = function() {
        speakCardEnglish(englishWord);
      };
      
      modal.classList.add('active');
    }

    function closeCardModal() {
      const modal = document.getElementById('cardModal');
      modal.classList.remove('active');
      
      // 停止 Modal 中的影片播放
      document.querySelectorAll('.card-detail-video').forEach(video => {
        video.pause();
        video.currentTime = 0;
      });
      
      // 停止發音
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }
    }

    // ESC 鍵關閉 Modal
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeCardModal();
      }
    });

    function handleSearch() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      
      if (!selectedSeries) return;
      
      const seriesCards = getSeriesCards(selectedSeries);
      const ownedCards = LinkageSystem.cards.getOwnedCards();
      
      if (!searchTerm) {
        renderSeriesCards(selectedSeries);
        return;
      }
      
      // 搜尋卡片
      const filteredCards = seriesCards.filter(card => 
        card.zh.toLowerCase().includes(searchTerm) ||
        card.word.toLowerCase().includes(searchTerm) ||
        (card.rarity && card.rarity.toLowerCase().includes(searchTerm))
      );
      
      // 重新渲染卡片
      renderFilteredCards(filteredCards, ownedCards);
    }

    function handleFilter() {
      const filterValue = document.getElementById('filterSelect').value;
      
      if (!selectedSeries) return;
      
      const seriesCards = getSeriesCards(selectedSeries);
      const ownedCards = LinkageSystem.cards.getOwnedCards();
      
      let filteredCards = [...seriesCards];
      
      switch(filterValue) {
        case 'all':
          // 顯示全部
          break;
        case 'owned':
          // 只顯示已收集
          filteredCards = filteredCards.filter(card => ownedCards[card.word]);
          break;
        case 'missing':
          // 只顯示未收集
          filteredCards = filteredCards.filter(card => !ownedCards[card.word]);
          break;
        case 'ssr':
          // 只顯示 SSR
          filteredCards = filteredCards.filter(card => card.rarity === '超稀有');
          break;
        case 'sr':
          // 只顯示 SR
          filteredCards = filteredCards.filter(card => card.rarity === '稀有');
          break;
        case 'r':
          // 只顯示 R
          filteredCards = filteredCards.filter(card => card.rarity === '普通');
          break;
        case 'near-complete':
          // 快完成系列（不適用於單一系列篩選）
          break;
      }
      
      renderFilteredCards(filteredCards, ownedCards);
    }

    function renderFilteredCards(cards, ownedCards) {
      const cardGrid = document.getElementById('cardGrid');
      
      // 依照編號排序
      cards.sort((a, b) => {
        const aIndex = window.allCards.indexOf(a);
        const bIndex = window.allCards.indexOf(b);
        return aIndex - bIndex;
      });
      
      // 渲染卡片
      cardGrid.innerHTML = cards.map((card, index) => {
        const isOwned = ownedCards[card.word];
        const cardNumber = String(window.allCards.indexOf(card) + 1).padStart(3, '0');
        
        if (isOwned) {
          const rarityClass = card.rarity === '超稀有' ? 'rarity-ssr' : card.rarity === '稀有' ? 'rarity-sr' : 'rarity-r';
          const rarityText = card.rarity === '超稀有' ? 'SSR' : card.rarity === '稀有' ? 'A' : 'R';
          const media = getCardMedia(card);
          
          // 判斷顯示影片還是圖片（參考 cards.html 的渲染模式）
          let mediaElement;
          let imgSrc = media.src;
          
          if (imgSrc && imgSrc.endsWith('.mp4')) {
            // mp4 檔案：用 video 標籤擷取第一幀作為縮圖
            mediaElement = `
              <video 
                class="card-media card-video" 
                preload="metadata" 
                muted 
                loop 
                playsinline
                data-fallback="${media.fallback}"
                onmouseenter="this.play().catch(() => {})"
                onmouseleave="this.pause(); this.currentTime = 0;"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
              >
                <source src="${imgSrc}" type="video/mp4">
              </video>
              <img class="card-image card-fallback" src="${media.fallback}" alt="${card.zh}" style="display:none;" onerror="this.onerror=null; this.src='img/cards/default.png';">
            `;
          } else {
            // 一般圖片
            mediaElement = `<img class="card-image" src="${imgSrc}" alt="${card.zh}" onerror="this.onerror=null; this.src='${media.fallback}';">`;
          }
          
          return `
            <div class="collection-card owned ${rarityClass}" onclick="showCardDetail('${card.word}')">
              <span class="card-owned-star">⭐</span>
              <div class="card-number">#${cardNumber}</div>
              <div class="card-media-container">
                ${mediaElement}
              </div>
              <div class="card-name">${card.zh}</div>
              <div class="card-rarity ${rarityClass}">${rarityText}</div>
            </div>
          `;
        } else {
          const rarityClass = card.rarity === '超稀有' ? 'rarity-ssr' : card.rarity === '稀有' ? 'rarity-sr' : 'rarity-r';
          const rarityText = card.rarity === '超稀有' ? 'SSR' : card.rarity === '稀有' ? 'A' : 'R';
          
          // 未獲得卡片不顯示影片，只顯示問號
          return `
            <div class="collection-card missing" onclick="showMissingCardDetail('${card.word}')">
              <div class="card-number">#${cardNumber}</div>
              <div class="card-missing-icon">?</div>
              <div class="card-missing-text">尚未獲得</div>
              <div class="card-rarity ${rarityClass}">${rarityText}</div>
            </div>
          `;
        }
      }).join('');
    }

    // 點擊 Modal 外部關閉
    document.getElementById('cardModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeCardModal();
      }
    });

    // 輔助函式：獲取所有系列
    function getAllSeries() {
      if (!window.allCards || !Array.isArray(window.allCards)) return [];
      
      const seriesSet = new Set();
      window.allCards.forEach(card => {
        if (card.category) {
          seriesSet.add(card.category);
        }
      });
      
      return Array.from(seriesSet);
    }

    // 輔助函式：獲取指定系列的所有卡片
    function getSeriesCards(seriesName) {
      if (!window.allCards || !Array.isArray(window.allCards)) return [];
      
      return window.allCards.filter(card => card.category === seriesName);
    }

    // 媒體判斷函式：判斷卡片應顯示影片還是圖片
    function getCardMedia(card) {
      if (!card) return { type: 'image', src: 'img/cards/default.png', fallback: 'img/cards/default.png' };
      
      // 輔助函式：檢查是否是有效的 MP4 檔案
      function isValidMp4(url) {
        if (!url || typeof url !== 'string') return false;
        const lowerUrl = url.toLowerCase().trim();
        // 檢查是否是 MP4 檔案
        if (lowerUrl.endsWith('.mp4')) return true;
        // 跳過 YouTube URL
        if (lowerUrl.includes('youtube.com') || lowerUrl.includes('youtu.be')) return false;
        return false;
      }
      
      // 優先使用 video 欄位（只接受真正的 MP4 檔案）
      if (card.video && isValidMp4(card.video)) {
        return { 
          type: 'video', 
          src: card.video, 
          fallback: card.image || card.img || card.imageUrl || 'img/cards/default.png' 
        };
      }
      
      // 備用：使用 mp4 欄位
      if (card.mp4 && isValidMp4(card.mp4)) {
        return { 
          type: 'video', 
          src: card.mp4, 
          fallback: card.image || card.img || card.imageUrl || 'img/cards/default.png' 
        };
      }
      
      // 備用：使用 video_url 欄位（只接受真正的 MP4 檔案）
      if (card.video_url && isValidMp4(card.video_url)) {
        return { 
          type: 'video', 
          src: card.video_url, 
          fallback: card.image || card.img || card.imageUrl || 'img/cards/default.png' 
        };
      }
      
      // 沒有有效的影片，使用圖片
      if (card.image && typeof card.image === 'string' && card.image.trim() !== '') {
        return { 
          type: 'image', 
          src: card.image, 
          fallback: 'img/cards/default.png' 
        };
      }
      
      // 備用：使用 img 欄位
      if (card.img && typeof card.img === 'string' && card.img.trim() !== '') {
        return { 
          type: 'image', 
          src: card.img, 
          fallback: 'img/cards/default.png' 
        };
      }
      
      // 備用：使用 imageUrl 欄位
      if (card.imageUrl && typeof card.imageUrl === 'string' && card.imageUrl.trim() !== '') {
        return { 
          type: 'image', 
          src: card.imageUrl, 
          fallback: 'img/cards/default.png' 
        };
      }
      
      // 都沒有，使用預設圖片
      return { type: 'image', src: 'img/cards/default.png', fallback: 'img/cards/default.png' };
    }

    // 彈窗媒體判斷函式：判斷彈窗應顯示影片還是圖片
    function getCardModalMedia(card) {
      if (!card) return { type: 'image', src: 'img/cards/default-card.png', fallback: 'img/cards/default-card.png' };
      
      // 輔助函式：檢查是否是有效的 MP4 檔案
      function isValidMp4(url) {
        if (!url || typeof url !== 'string') return false;
        const lowerUrl = url.toLowerCase().trim();
        // 檢查是否是 MP4 檔案
        if (lowerUrl.endsWith('.mp4')) return true;
        // 跳過 YouTube URL
        if (lowerUrl.includes('youtube.com') || lowerUrl.includes('youtu.be')) return false;
        return false;
      }
      
      // 檢查多個可能的影片欄位
      const video = card.video || card.mp4 || card.videoUrl || '';
      const image = card.image || card.img || card.imageUrl || 'img/cards/default-card.png';
      
      // 如果有有效的 MP4，優先顯示影片
      if (video && isValidMp4(video)) {
        return {
          type: 'video',
          src: video,
          fallback: image || 'img/cards/default-card.png'
        };
      }
      
      // 如果 image 欄位是 MP4
      if (image && isValidMp4(image)) {
        return {
          type: 'video',
          src: image,
          fallback: card.img || card.imageUrl || 'img/cards/default-card.png'
        };
      }
      
      // 回傳圖片
      return {
        type: 'image',
        src: image || 'img/cards/default-card.png',
        fallback: 'img/cards/default-card.png'
      };
    }

    // 彈窗媒體渲染函式
    function renderCardModalMedia(card, isOwned) {
      if (!isOwned) {
        return `
          <div class="card-detail-missing-media">
            <span class="card-detail-question">?</span>
            <p>尚未獲得</p>
          </div>
        `;
      }

      const media = getCardModalMedia(card);

      if (media.type === 'video') {
        return `
          <video
            class="card-detail-media card-detail-video"
            src="${media.src}"
            controls
            autoplay
            muted
            loop
            playsinline
            preload="metadata"
            data-fallback="${media.fallback}"
            onerror="this.outerHTML='<img class=&quot;card-detail-media card-detail-image&quot; src=&quot;${media.fallback}&quot; alt=&quot;${card.zh || '卡片'}&quot; onerror=&quot;this.onerror=null;this.src=\\'img/cards/default-card.png\\';&quot;>';"
          ></video>
        `;
      }

      return `
        <img
          class="card-detail-media card-detail-image"
          src="${media.src}"
          alt="${card.zh || '卡片'}"
          onerror="this.onerror=null;this.src='${media.fallback}';"
        >
      `;
    }

    // 獲取卡片英文單字
    function getCardEnglish(card) {
      if (!card) return '尚未設定英文單字';
      
      // 支援多種英文欄位名稱
      const english = card.english || card.word || card.en || card.vocabulary || card.englishWord || '';
      
      // 防呆：檢查是否為有效字串
      if (english && typeof english === 'string' && english.trim() !== '' && 
          english !== 'undefined' && english !== 'null' && english !== 'NaN') {
        return english.trim();
      }
      
      return '尚未設定英文單字';
    }

    // 發音功能
    function speakCardEnglish(word) {
      if (!word || word === '尚未設定英文單字') {
        alert('這張卡片尚未設定英文單字');
        return;
      }

      if (!('speechSynthesis' in window)) {
        alert('此瀏覽器不支援發音功能');
        return;
      }

      // 取消之前的發音
      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = 'en-US';
      utterance.rate = 0.85;
      utterance.pitch = 1;
      window.speechSynthesis.speak(utterance);
    }
  </script>
</body>
